name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install OpenGL deps (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxkbcommon-dev libgl1-mesa-dev libxi-dev
      - name: Cargo check (core + terminal)
        run: cargo check -p chaos-rpg-core -p chaos-rpg
      - name: Cargo check (graphical)
        run: cargo check -p chaos-rpg-graphical
      - name: Test (core only)
        run: cargo test -p chaos-rpg-core --lib

  fmt-clippy:
    name: Format + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install OpenGL deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxkbcommon-dev libgl1-mesa-dev libxi-dev
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (core)
        run: cargo clippy -p chaos-rpg-core -- -W clippy::all
