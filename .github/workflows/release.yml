name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Proof Engine Frontend (the new one) ──────────────────────────────────────
  build-proof-windows:
    name: Proof Engine — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout proof-engine
        uses: actions/checkout@v4
        with:
          repository: Mattbusel/proof-engine
          path: proof-engine-checkout
      - name: Place proof-engine at expected path
        shell: bash
        run: |
          mkdir -p "$(pwd)/../proof-engine"
          cp -r proof-engine-checkout/* "$(pwd)/../proof-engine/"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p chaos-rpg-proof
      - uses: actions/upload-artifact@v4
        with:
          name: chaos-rpg-proof-windows-x64
          path: target/release/chaos-rpg-proof.exe

  # ── Graphical (bracket-lib) ─────────────────────────────────────────────────
  build-graphical-windows:
    name: Graphical — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout proof-engine (needed by workspace)
        uses: actions/checkout@v4
        with:
          repository: Mattbusel/proof-engine
          path: proof-engine-checkout
      - name: Place proof-engine
        shell: bash
        run: |
          mkdir -p "$(pwd)/../proof-engine"
          cp -r proof-engine-checkout/* "$(pwd)/../proof-engine/"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p chaos-rpg-graphical
      - uses: actions/upload-artifact@v4
        with:
          name: chaos-rpg-graphical-windows-x64
          path: target/release/chaos-rpg-graphical.exe

  # ── Terminal (ratatui) ──────────────────────────────────────────────────────
  build-terminal-windows:
    name: Terminal — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout proof-engine (needed by workspace)
        uses: actions/checkout@v4
        with:
          repository: Mattbusel/proof-engine
          path: proof-engine-checkout
      - name: Place proof-engine
        shell: bash
        run: |
          mkdir -p "$(pwd)/../proof-engine"
          cp -r proof-engine-checkout/* "$(pwd)/../proof-engine/"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p chaos-rpg
      - uses: actions/upload-artifact@v4
        with:
          name: chaos-rpg-terminal-windows-x64
          path: target/release/chaos-rpg.exe

  # ── Package & Release ──────────────────────────────────────────────────────
  create-release:
    needs:
      - build-proof-windows
      - build-graphical-windows
      - build-terminal-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create zip package
        run: |
          mkdir -p package
          cp artifacts/chaos-rpg-proof-windows-x64/chaos-rpg-proof.exe package/
          cp artifacts/chaos-rpg-graphical-windows-x64/chaos-rpg-graphical.exe package/
          cp artifacts/chaos-rpg-terminal-windows-x64/chaos-rpg.exe package/chaos-rpg-terminal.exe
          cp chaos_config.toml package/
          cp -r assets package/ 2>/dev/null || true
          echo "CHAOS RPG v2.0 — Double-click chaos-rpg-proof.exe to play" > package/README.txt
          cd package && zip -r ../chaos-rpg-windows.zip . && cd ..

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME:-dev-build}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "artifacts/chaos-rpg-proof-windows-x64/chaos-rpg-proof.exe#chaos-rpg-proof.exe" \
            "artifacts/chaos-rpg-graphical-windows-x64/chaos-rpg-graphical.exe#chaos-rpg-graphical.exe" \
            "artifacts/chaos-rpg-terminal-windows-x64/chaos-rpg.exe#chaos-rpg-terminal.exe" \
            "chaos-rpg-windows.zip#chaos-rpg-v2.0-windows.zip" \
            --title "CHAOS RPG $TAG — Proof Engine" \
            --notes "## CHAOS RPG $TAG

          Powered by **Proof Engine** — 221,000+ line custom mathematical rendering engine.

          ### Downloads

          | File | Description |
          |------|-------------|
          | **chaos-rpg-proof.exe** | **Proof Engine frontend (recommended)** |
          | chaos-rpg-graphical.exe | Legacy bracket-lib frontend |
          | chaos-rpg-terminal.exe | Terminal frontend |
          | chaos-rpg-v2.0-windows.zip | All three + config |

          Built by GitHub Actions on windows-latest. Full source: [chaos-rpg](https://github.com/Mattbusel/chaos-rpg) + [proof-engine](https://github.com/Mattbusel/proof-engine)"
